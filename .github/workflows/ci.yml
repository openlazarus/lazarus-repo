name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lazarus-api:
    name: lazarus-api (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lazarus-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/lazarus-api/package-lock.json

      - run: npm ci

      - run: npm run format:check

      - run: npm run lint

      - run: npm run build

  lazarus-ui:
    name: lazarus-ui (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/lazarus-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/lazarus-ui/package-lock.json

      - run: npm ci

      - run: npm run lint
